name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[tools,duckdb]"

      # The unit suite uses in-memory fakes (tests/fakes.py) — no Redis, Postgres,
      # network, or slack_sdk on the default path — so it runs with zero services.
      - name: Run tests
        run: pytest tests/ -q

      # End-to-end smoke on a SYNTHETIC season: runs the real walk_forward +
      # holdout + betting backtest + closing-odds ingest with no data/network/DB,
      # so a regression in the full pipeline (not just a unit) fails CI.
      - name: Offline end-to-end dry run
        run: python scripts/offline_dryrun.py
