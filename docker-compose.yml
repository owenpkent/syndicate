# Sportsball — "cluster in a box". One image, many roles.
#
# All agents share a single build (x-app anchor); each service just overrides
# the command with its console entrypoint. Credentials come from .env.

x-app: &app
  build: .
  image: sportsball:local
  env_file:
    - .env
  environment:
    - REDIS_HOST=redis
    - DB_HOST=postgres
    - PYTHONUNBUFFERED=1
  volumes:
    - ./config:/app/config
    - ./models:/app/models
  restart: always

services:
  redis:
    image: redis:7-alpine
    container_name: sportsball_broker
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: sportsball_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sportsball_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_env}
      POSTGRES_DB: ${POSTGRES_DB:-market_history}
    ports:
      - "5432:5432"
    volumes:
      - ./data/sportsball_postgres:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  oracle_agent:
    <<: *app
    container_name: agent_oracle
    depends_on: [redis]
    command: ["sportsball-oracle"]

  scout_agent:
    <<: *app
    container_name: agent_scout
    depends_on: [redis]
    command: ["sportsball-scout"]

  analytics_engine:
    <<: *app
    container_name: agent_engine
    depends_on: [redis, postgres]
    command: ["sportsball-engine"]

  sniper_agent:
    <<: *app
    container_name: agent_sniper
    depends_on: [redis, postgres]
    command: ["sportsball-sniper"]

  settlement_agent:
    <<: *app
    container_name: agent_settlement
    depends_on: [redis, postgres]
    environment:
      - REDIS_HOST=redis
      - DB_HOST=postgres
      - PYTHONUNBUFFERED=1
      - SETTLEMENT_INTERVAL=60
    command: ["sportsball-settlement"]

  dashboard:
    <<: *app
    container_name: sportsball_dashboard
    depends_on: [postgres]
    restart: "no"
    command: ["sportsball-dashboard"]
